<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>لوحة تطويري</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-UHulo5NA.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B7_3QFmY.css">
  </head>
  <body>
    <div id="root"></div>

    <script>
    (function() {
      'use strict';

      /*
       * تحدي الـ30 يوم
       * Theme variables (dark):
       *   --background: 222 47% 8%
       *   --foreground: 210 40% 98%
       *   --card: 222 47% 11%
       *   --card-foreground: 210 40% 98%
       *   --card-border: 222 47% 16%
       *   --border: 222 47% 16%
       *   --primary: 188 86% 53%
       *   --primary-foreground: 222 47% 11%
       *   --secondary: 222 47% 16%
       *   --muted: 222 47% 16%
       *   --muted-foreground: 215 20.2% 65.1%
       *   --success: 142 71% 45%
       *   --sidebar: 222 47% 9%
       *   --sidebar-foreground: 210 40% 98%
       *   --sidebar-accent: 222 47% 16%
       *   Font: Tajawal, sans-serif
       *   --radius: 0.75rem
       */

      const STORAGE_KEY = 'challenge30_data';

      function getStoredData() {
        try {
          const data = localStorage.getItem(STORAGE_KEY);
          if (data) return JSON.parse(data);
        } catch(e) {}
        return { name: '', days: Array(30).fill(false) };
      }

      function saveData(data) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch(e) {}
      }

      // Inject nav item into sidebar
      function injectNavItem() {
        const checkNav = setInterval(() => {
          // Find the nav container by looking for sidebar links
          const allLinks = document.querySelectorAll('aside a, nav a');
          let navContainer = null;
          let settingsLink = null;

          for (const link of allLinks) {
            if (link.textContent && link.textContent.includes('الإعدادات')) {
              settingsLink = link.closest('a');
              navContainer = settingsLink ? settingsLink.parentElement : null;
              break;
            }
          }

          if (navContainer && !document.querySelector('[data-challenge-nav]')) {
            clearInterval(checkNav);

            const navItem = document.createElement('a');
            navItem.setAttribute('data-challenge-nav', 'true');
            navItem.href = '#';
            navItem.onclick = function(e) {
              e.preventDefault();
              showChallengePage();
            };

            // Match the exact same structure: div > icon + span
            navItem.innerHTML = `
              <div class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl transition-all hover-elevate cursor-pointer font-medium text-[13px] text-sidebar-foreground hover:bg-sidebar-accent">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span class="whitespace-nowrap leading-tight">تحدي الـ30 يوم</span>
              </div>
            `;

            if (settingsLink) {
              navContainer.insertBefore(navItem, settingsLink);
            } else {
              navContainer.appendChild(navItem);
            }
          }
        }, 300);
      }

      function showChallengePage() {
        let overlay = document.getElementById('challenge30-overlay');
        if (overlay) {
          overlay.style.display = 'flex';
          renderChallenge(overlay);
          return;
        }

        overlay = document.createElement('div');
        overlay.id = 'challenge30-overlay';
        overlay.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: hsl(222, 47%, 8%);
          z-index: 9999;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          overflow-y: auto;
          padding: 32px 16px;
          direction: rtl;
          font-family: "Tajawal", sans-serif;
        `;
        document.body.appendChild(overlay);
        renderChallenge(overlay);
      }

      function renderChallenge(container) {
        const data = getStoredData();
        const completedCount = data.days.filter(d => d).length;
        const percentage = Math.round((completedCount / 30) * 100);
        const allDone = completedCount === 30;

        container.innerHTML = `
          <div style="max-width:600px;width:100%;animation:fadeIn 0.3s ease;">
            
            <!-- Header -->
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;">
              <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:40px;height:40px;border-radius:12px;background:hsl(142,71%,45%,0.1);display:flex;align-items:center;justify-content:center;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="hsl(142,71%,45%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <h1 style="font-size:22px;font-weight:700;color:hsl(210,40%,98%);margin:0;">تحدي الـ30 يوم</h1>
              </div>
              <button id="challenge30-close" style="width:36px;height:36px;border-radius:10px;border:1px solid hsl(222,47%,16%);background:hsl(222,47%,11%);color:hsl(215,20.2%,65.1%);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;">✕</button>
            </div>

            <!-- Challenge Name Card -->
            <div style="background:hsl(222,47%,11%);border:1px solid hsl(222,47%,16%);border-radius:12px;padding:20px;margin-bottom:16px;">
              <label style="display:block;font-size:13px;font-weight:500;color:hsl(215,20.2%,65.1%);margin-bottom:10px;">اسم التحدي</label>
              <input id="challenge30-name" type="text" placeholder="مثال: تحدي الرياضة، تحدي القراءة..." 
                value="${(data.name || '').replace(/"/g, '&quot;')}"
                style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid hsl(222,47%,16%);background:hsl(222,47%,8%);color:hsl(210,40%,98%);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;direction:rtl;box-sizing:border-box;transition:border-color 0.2s;" 
                onfocus="this.style.borderColor='hsl(188,86%,53%)'" 
                onblur="this.style.borderColor='hsl(222,47%,16%)'" />
            </div>

            <!-- Progress Card -->
            <div style="background:hsl(222,47%,11%);border:1px solid hsl(222,47%,16%);border-radius:12px;padding:20px;margin-bottom:16px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <span style="font-size:13px;font-weight:500;color:hsl(215,20.2%,65.1%);">التقدم</span>
                <span style="font-size:18px;font-weight:700;color:hsl(142,71%,45%);">${completedCount}<span style="color:hsl(215,20.2%,65.1%);font-size:14px;font-weight:500;">/30</span></span>
              </div>
              <div style="width:100%;height:8px;background:hsl(222,47%,16%);border-radius:99px;overflow:hidden;">
                <div style="width:${percentage}%;height:100%;background:hsl(142,71%,45%);border-radius:99px;transition:width 0.4s ease;"></div>
              </div>
              <div style="text-align:left;margin-top:8px;font-size:12px;color:hsl(215,20.2%,65.1%);">${percentage}%</div>
            </div>

            ${allDone ? `
            <!-- Congratulations -->
            <div style="background:hsl(142,71%,45%,0.08);border:1px solid hsl(142,71%,45%,0.25);border-radius:12px;padding:24px;text-align:center;margin-bottom:16px;">
              <div style="font-size:36px;margin-bottom:10px;">🎉🏆</div>
              <p style="font-size:17px;font-weight:700;color:hsl(142,71%,45%);margin:0;">مبروك أنجزت التحدي!</p>
              <p style="font-size:13px;color:hsl(215,20.2%,65.1%);margin-top:8px;">أنت بطل! كملت 30 يوم بنجاح 💪</p>
            </div>
            ` : ''}

            <!-- Days Grid Card -->
            <div style="background:hsl(222,47%,11%);border:1px solid hsl(222,47%,16%);border-radius:12px;padding:20px;margin-bottom:16px;">
              <label style="display:block;font-size:13px;font-weight:500;color:hsl(215,20.2%,65.1%);margin-bottom:16px;">اضغط على اليوم لتسجيل إنجازك</label>
              <div id="challenge30-grid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;">
                ${data.days.map((done, i) => `
                  <button class="challenge30-day" data-index="${i}" style="
                    width:100%;
                    aspect-ratio:1;
                    border-radius:50%;
                    border:2px solid ${done ? 'hsl(142,71%,45%)' : 'hsl(222,47%,16%)'};
                    background:${done ? 'hsl(142,71%,45%,0.12)' : 'hsl(222,47%,8%)'};
                    color:${done ? 'hsl(142,71%,45%)' : 'hsl(215,20.2%,65.1%)'};
                    font-size:13px;
                    font-weight:600;
                    font-family:'Tajawal',sans-serif;
                    cursor:pointer;
                    transition:all 0.2s ease;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                  ">${done ? '✓' : (i + 1)}</button>
                `).join('')}
              </div>
            </div>

            <!-- Reset Button -->
            <div style="text-align:center;padding-top:8px;">
              <button id="challenge30-reset" style="
                padding:10px 24px;
                border-radius:10px;
                border:1px solid hsl(0,62%,30%,0.4);
                background:hsl(0,62%,30%,0.08);
                color:hsl(0,62%,60%);
                font-size:13px;
                font-weight:600;
                font-family:'Tajawal',sans-serif;
                cursor:pointer;
                transition:all 0.2s;
              ">إعادة تعيين التحدي</button>
            </div>
          </div>

          <style>
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(8px) scale(0.98); }
              to { opacity: 1; transform: translateY(0) scale(1); }
            }
            .challenge30-day:hover {
              transform: scale(1.1);
              border-color: hsl(188,86%,53%) !important;
            }
            #challenge30-reset:hover {
              background: hsl(0,62%,30%,0.15) !important;
            }
            #challenge30-close:hover {
              background: hsl(222,47%,16%);
              color: hsl(210,40%,98%);
            }
          </style>
        `;

        // Event Listeners
        container.querySelector('#challenge30-close').addEventListener('click', () => {
          container.style.display = 'none';
        });

        container.querySelector('#challenge30-name').addEventListener('input', (e) => {
          const d = getStoredData();
          d.name = e.target.value;
          saveData(d);
        });

        container.querySelectorAll('.challenge30-day').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.getAttribute('data-index'));
            const d = getStoredData();
            d.days[idx] = !d.days[idx];
            saveData(d);
            renderChallenge(container);
          });
        });

        container.querySelector('#challenge30-reset').addEventListener('click', () => {
          if (confirm('هل أنت متأكد من إعادة تعيين التحدي؟ سيتم مسح كل التقدم.')) {
            saveData({ name: '', days: Array(30).fill(false) });
            renderChallenge(container);
          }
        });
      }

      // Initialize
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', injectNavItem);
      } else {
        injectNavItem();
      }

    })();
    </script>
  </body>
</html>
